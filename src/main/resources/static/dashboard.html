<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CivicPulse – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* === FIXES: straighten layout & left-edge alignment === */
    html, body { overflow-x: hidden; }
    .app { display: block; min-height: 100vh; }
    .sidebar {
      background: var(--ink);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0;
      width: var(--sidebar-w); height: 100vh;
      overflow-y: auto; z-index: 100;
      transition: transform 0.3s;
      will-change: transform;
      backface-visibility: hidden;
    }
    .main { margin-left: var(--sidebar-w); min-height: 100vh; width: auto; position: relative; }
    @media (max-width: 640px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0d1117; --ink-soft: #4b5563; --surface: #f3f5f9; --panel: #ffffff;
      --accent: #1a56db; --accent-light: #e8effd;
      --citizen: #0ea5e9; --citizen-bg: #f0f9ff;
      --admin: #8b5cf6;   --admin-bg: #f5f3ff;
      --officer: #10b981; --officer-bg: #ecfdf5;
      --border: #e5e8f0;
      --sidebar-w: 260px;
    }
    body.role-citizen { --role-color: var(--citizen); --role-bg: var(--citizen-bg); --role-accent: #075985; }
    body.role-admin   { --role-color: var(--admin);   --role-bg: var(--admin-bg);   --role-accent: #4c1d95; }
    body.role-officer { --role-color: var(--officer); --role-bg: var(--officer-bg); --role-accent: #064e3b; }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--ink); }

    .sidebar-logo {
      padding: 24px 20px 20px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo-icon-sm {
      width: 34px; height: 34px; background: var(--accent); border-radius: 9px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-icon-sm svg { width: 18px; height: 18px; fill: white; }
    .logo-text-sm { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: white; }

    .sidebar-role {
      margin: 16px 16px 8px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 10px;
    }
    .role-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--role-color); flex-shrink: 0; }
    .role-name-display { font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700; color: white; text-transform: uppercase; letter-spacing: 0.06em; }
    .role-username { font-size: 0.75rem; color: rgba(255,255,255,0.45); margin-top: 1px; }

    .nav-section { padding: 20px 12px 8px; }
    .nav-section-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.3); padding: 0 8px; margin-bottom: 6px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      color: rgba(255,255,255,0.55);
      font-size: 0.88rem;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
    .nav-item.active { background: var(--role-color); color: white; }
    .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto; background: rgba(255,255,255,0.15);
      border-radius: 20px; padding: 1px 8px; font-size: 0.7rem; font-weight: 600; color: white;
    }
    .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
    .logout-btn {
      width: 100%; padding: 10px; background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.2); border-radius: 10px;
      color: #f87171; font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
      font-weight: 500; cursor: pointer; transition: background 0.15s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.22); }

    .topbar {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-content { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .topbar-left h1 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.25rem; color: var(--ink); }
    .topbar-left p  { font-size: 0.82rem; color: var(--ink-soft); margin-top: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--role-color); color: white;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.9rem;
    }

    .content { padding: 40px 32px; max-width: 1200px; width: 100%; }
    .welcome-banner {
      background: var(--role-color); border-radius: 20px; padding: 28px 32px;
      color: white; margin-bottom: 28px; display: flex; align-items: center; justify-content: space-between;
      overflow: hidden; position: relative;
    }
    .welcome-banner::after { content: ''; position: absolute; right: -30px; top: -40px; width: 200px; height: 200px; background: rgba(255,255,255,0.08); border-radius: 50%; }
    .welcome-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem; margin-bottom: 6px; }
    .welcome-sub   { font-size: 0.88rem; opacity: 0.8; }
    .welcome-emoji { font-size: 3.5rem; position: relative; z-index: 1; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; transition: box-shadow 0.2s; }
    .stat-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
    .stat-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .stat-card-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
    .stat-card-trend { font-size: 0.75rem; color: #10b981; font-weight: 600; }
    .stat-card-num { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--ink); }
    .stat-card-label { font-size: 0.8rem; color: var(--ink-soft); margin-top: 2px; }

    .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
    .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
    .card-action { font-size: 0.8rem; color: var(--accent); cursor: pointer; font-weight: 500; }

    .grievance-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .grievance-item:last-child { border-bottom: none; }
    .g-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
    .g-info { flex: 1; min-width: 0; }
    .g-title { font-weight: 600; font-size: 0.88rem; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .g-meta  { font-size: 0.75rem; color: var(--ink-soft); margin-top: 2px; }
    .g-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; flex-shrink: 0; }
    .badge-pending  { background: #fef3c7; color: #92400e; }
    .badge-progress { background: #dbeafe; color: #1e40af; }
    .badge-resolved { background: #d1fae5; color: #065f46; }
    .badge-closed   { background: #f3f4f6; color: #374151; }

    .quick-actions { display: flex; flex-direction: column; gap: 10px; }
    .action-btn { width: 100%; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 12px; background: transparent; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px; transition: background 0.15s, border-color 0.15s; font-family: 'DM Sans', sans-serif; }
    .action-btn:hover { background: var(--role-bg); border-color: var(--role-color); }
    .action-btn-icon { font-size: 1.3rem; }
    .action-btn-title { font-weight: 600; font-size: 0.88rem; color: var(--ink); display: block; }
    .action-btn-sub   { font-size: 0.75rem; color: var(--ink-soft); margin-top: 1px; display: block; }

    .dashboard-panel { display: none; }
    .dashboard-panel.active { display: block; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: white; padding: 12px 20px; border-radius: 12px; font-size: 0.88rem; font-weight: 500; transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.22,1,0.36,1); z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }

    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .content-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon-sm"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
      <span class="logo-text-sm">CivicPulse</span>
    </div>
    <div class="sidebar-role">
      <div class="role-dot"></div>
      <div class="role-info">
        <div class="role-name-display" id="sidebarRole">Loading…</div>
        <div class="role-username" id="sidebarUsername">@user</div>
      </div>
    </div>
    <div id="navItems"></div>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()">⬡ Sign Out</button></div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="topbar-content">
        <div class="topbar-left"><h1 id="topbarTitle">Dashboard</h1><p id="topbarDate"></p></div>
        <div class="topbar-right"><div class="avatar" id="userAvatar">?</div></div>
      </div>
    </div>
    <div class="content" id="dashboardContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const token = localStorage.getItem('civicpulse_token');
const userStr = localStorage.getItem('civicpulse_user');
if (!token || !userStr) window.location.href = '/index.html';
const user = JSON.parse(userStr);
const role = user.role;
document.body.classList.add('role-' + role.toLowerCase());
document.getElementById('sidebarRole').textContent = role;
document.getElementById('sidebarUsername').textContent = '@' + user.username;
document.getElementById('userAvatar').textContent = user.username[0].toUpperCase();
document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

const NAV = {
  CITIZEN: [
    { section: 'Main', items: [
      { id: 'overview', label: 'Overview',        icon: homeIcon() },
      { id: 'submit',   label: 'Submit Grievance', icon: plusIcon() },
      { id: 'myissues', label: 'My Grievances',   icon: listIcon() },
    ]},
    { section: 'Account', items: [ { id: 'profile',  label: 'My Profile', icon: userIcon() } ] },
  ],
  ADMIN: [
    { section: 'Management', items: [
      { id: 'overview',  label: 'Dashboard',       icon: homeIcon() },
      { id: 'allissues', label: 'All Grievances',  icon: listIcon() },
      { id: 'assign',    label: 'Assign Officers', icon: assignIcon() },
    ]}
  ],
  OFFICER: [
    { section: 'Work', items: [
      { id: 'overview',   label: 'Overview',       icon: homeIcon() },
      { id: 'assigned',   label: 'Assigned Tasks', icon: listIcon() },
      { id: 'inprogress', label: 'In Progress',    icon: wrenchIcon() },
    ]}
  ],
};

let activeNav = 'overview';
function buildNav() {
  const container = document.getElementById('navItems');
  const sections  = NAV[role] || NAV['CITIZEN'];
  let html = '';
  for (const sec of sections) {
    html += `<div class="nav-section"><div class="nav-section-label">${sec.section}</div>`;
    for (const item of sec.items) {
      html += `<a class="nav-item ${item.id === activeNav ? 'active' : ''}" onclick="navigateTo('${item.id}')" href="#">${item.icon}${item.label}</a>`;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function navigateTo(panelId) {
  if (panelId === 'submit')    { window.location.href = '/submit.html';       return; }
  if (panelId === 'myissues')  { window.location.href = '/mygrievances.html'; return; }
  if (panelId === 'allissues') { window.location.href = '/admingrievances.html'; return; }
  if (panelId === 'assign')    { window.location.href = '/assignofficers.html'; return; }
  if (role === 'OFFICER' && (panelId === 'assigned' || panelId === 'inprogress' || panelId === 'completed')) {
    window.location.href = '/officer.html'; return;
  }
  activeNav = panelId;
  buildNav();
  renderContent(panelId);
  document.getElementById('topbarTitle').textContent = getLabelForId(panelId);
}

function getLabelForId(id) {
  const all = (NAV[role]||[]).flatMap(s=>s.items);
  return all.find(i=>i.id===id)?.label || 'Dashboard';
}

function renderContent(panelId) {
  const el = document.getElementById('dashboardContent');
  if (panelId === 'overview') {
    el.innerHTML = renderOverview();
  } else {
    el.innerHTML = `<div style="text-align:center; padding: 60px 20px; background:var(--panel); border-radius:20px; border:1px solid var(--border);">
      <div style="font-size:3rem; margin-bottom:16px">🚧</div>
      <div style="font-family:'Syne',sans-serif; font-weight:700; font-size:1.2rem; color:var(--ink); margin-bottom:8px">${getLabelForId(panelId)} — Coming Soon</div>
      <p style="color:var(--ink-soft); font-size:0.9rem;">This panel will be built in the next module.</p>
    </div>`;
  }
}

function renderOverview() {
  const configs = {
    CITIZEN: {
      welcomeMsg: 'Good to see you,', welcomeSub: 'Track your grievances and report new issues from here.', emoji: '🏘️',
      stats: [ { num: '3', label: 'Open Issues', icon: '📋', bg: '#fef3c7', trend: '+1 today' }, { num: '1', label: 'In Progress', icon: '⚙️', bg: '#dbeafe', trend: 'Active' }, { num: '7', label: 'Resolved', icon: '✅', bg: '#d1fae5', trend: 'All time' }, { num: '2', label: 'Notifications', icon: '🔔', bg: '#ede9fe', trend: 'Unread' } ],
      actions: [ { icon: '📝', title: 'File New Grievance', sub: 'Report a civic issue in your area', id: 'submit' }, { icon: '📍', title: 'Track Status', sub: 'View status of your submitted issues', id: 'myissues' }, { icon: '👤', title: 'Edit Profile', sub: 'Update your contact information', id: 'profile' } ],
      grievances: [ { icon: '💧', bg: '#dbeafe', title: 'Water supply interrupted – Block C', meta: 'Submitted 2 days ago', badge: 'badge-progress', status: 'In Progress' }, { icon: '💡', bg: '#fef3c7', title: 'Street light not working – MG Road', meta: 'Submitted 5 days ago', badge: 'badge-pending', status: 'Pending' } ]
    },
    ADMIN: {
      welcomeMsg: 'Hello, Administrator', welcomeSub: 'Manage grievances, assign officers, and monitor SLA compliance.', emoji: '🛡️',
      stats: [ { num: '42', label: 'Total Grievances', icon: '📊', bg: '#fef3c7', trend: '+8 this week' }, { num: '12', label: 'Pending Review', icon: '⏳', bg: '#fee2e2', trend: '3 urgent' }, { num: '18', label: 'In Progress', icon: '⚙️', bg: '#dbeafe', trend: 'Active' }, { num: '8', label: 'Officers Active', icon: '👷', bg: '#d1fae5', trend: 'On duty' } ],
      actions: [ { icon: '📋', title: 'Review All Grievances', sub: 'See all pending and open issues', id: 'allissues' }, { icon: '👷', title: 'Assign Officers', sub: 'Route issues to department officers', id: 'assign' }, { icon: '📈', title: 'SLA Report', sub: 'Check compliance & performance', id: 'reports' } ],
      grievances: [ { icon: '🗑️', bg: '#fef3c7', title: 'Garbage not collected – Ward 12', meta: 'Citizen: rahul_k • 1 hr ago', badge: 'badge-pending', status: 'Pending' }, { icon: '💧', bg: '#dbeafe', title: 'Water pipe burst – Nehru Street', meta: 'Citizen: priya_m • 3 hrs ago', badge: 'badge-progress', status: 'In Progress' } ]
    },
    OFFICER: {
      welcomeMsg: 'Ready to serve,', welcomeSub: 'View your assigned tasks and update resolution status.', emoji: '👷',
      stats: [ { num: '5', label: 'Assigned Tasks', icon: '📋', bg: '#fef3c7', trend: '2 new' }, { num: '2', label: 'In Progress', icon: '⚙️', bg: '#dbeafe', trend: 'Active' }, { num: '14', label: 'Completed', icon: '✅', bg: '#d1fae5', trend: 'This month' }, { num: '96', label: 'SLA Score %', icon: '🏆', bg: '#ede9fe', trend: 'Excellent' } ],
      actions: [ { icon: '📋', title: 'View Assigned Tasks', sub: 'See all issues assigned to you', id: 'assigned' }, { icon: '🔧', title: 'Update Issue Status', sub: 'Mark tasks as resolved', id: 'inprogress' }, { icon: '✅', title: 'Completion History', sub: 'View your resolved issues', id: 'completed' } ],
      grievances: [ { icon: '💡', bg: '#fef3c7', title: 'Street light repair – MG Road Jn.', meta: 'Assigned by admin • Due today', badge: 'badge-progress', status: 'In Progress' }, { icon: '💧', bg: '#dbeafe', title: 'Drain blockage – Patel Nagar', meta: 'Assigned by admin • Due tomorrow', badge: 'badge-pending', status: 'Pending' } ]
    }
  };
  const cfg = configs[role];
  return `<div class="welcome-banner"><div><div class="welcome-title">${cfg.welcomeMsg} ${user.username} 👋</div><div class="welcome-sub">${cfg.welcomeSub}</div></div><div class="welcome-emoji">${cfg.emoji}</div></div>
    <div class="stats-grid">${cfg.stats.map(s => `<div class="stat-card"><div class="stat-card-header"><div class="stat-card-icon" style="background:${s.bg}">${s.icon}</div><span class="stat-card-trend">${s.trend}</span></div><div class="stat-card-num">${s.num}</div><div class="stat-card-label">${s.label}</div></div>`).join('')}</div>
    <div class="content-grid"><div class="card"><div class="card-header"><span class="card-title">Recent ${role === 'CITIZEN' ? 'My Grievances' : 'Grievances'}</span><span class="card-action" onclick="window.location.href='/mygrievances.html'">View all →</span></div>${cfg.grievances.map(g => `<div class="grievance-item"><div class="g-icon" style="background:${g.bg}">${g.icon}</div><div class="g-info"><div class="g-title">${g.title}</div><div class="g-meta">${g.meta}</div></div><span class="g-badge ${g.badge}">${g.status}</span></div>`).join('')}</div>
      <div class="card"><div class="card-header"><span class="card-title">Quick Actions</span></div><div class="quick-actions">${cfg.actions.map(a => `<button class="action-btn" onclick="navigateTo('${a.id}')"><span class="action-btn-icon">${a.icon}</span><span class="action-btn-text"><span class="action-btn-title">${a.title}</span><span class="action-btn-sub">${a.sub}</span></span></button>`).join('')}</div></div></div>`;
}

function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2800); }
function logout() { localStorage.removeItem('civicpulse_token'); localStorage.removeItem('civicpulse_user'); window.location.href = '/index.html'; }
function homeIcon() { return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>'; }
function plusIcon() { return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'; }
