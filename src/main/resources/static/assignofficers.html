<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CivicPulse - Assign Officers</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #0d1117; --ink-soft: #5b6472; --surface: #f3f5f9; --panel: #ffffff;
            --admin: #7c3aed; --admin-soft: #ede9fe; --border:#e4e8f2;
            --pending:#f59e0b; --progress:#3b82f6;
        }
        body { font-family:'DM Sans',sans-serif; background:var(--surface); color:var(--ink); }
        .shell { max-width: 1200px; margin: 24px auto; padding: 0 20px; }
        .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .title { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; }
        .btn-link { text-decoration:none; padding:10px 14px; border-radius:10px; background:var(--admin-soft); color:var(--admin); font-weight:700; font-size:.85rem; }

        .toolbar { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:12px; display:grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap:10px; margin-bottom:14px; }
        .toolbar input, .toolbar select { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:10px; background:#fff; font-size:.88rem; outline:none; }
        .btn-primary { background:var(--admin); color:#fff; border:none; border-radius:10px; padding:10px 16px; font-weight:700; cursor:pointer; }

        .table-wrap { background:var(--panel); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:12px 14px; border-bottom:1px solid #f0f2f7; text-align:left; font-size:.84rem; }
        th { background:#fafbff; color:var(--ink-soft); font-size:.72rem; text-transform:uppercase; }
        .badge { padding:3px 9px; border-radius:999px; font-size:.72rem; font-weight:700; }
        .pending { background:#fef3c7; color:#92400e; }
        .progress { background:#dbeafe; color:#1e40af; }

        .actions { display:grid; grid-template-columns:1fr 1fr auto; gap:8px; align-items:center; }
        .actions select { padding:8px; border:1px solid var(--border); border-radius:8px; font-size:.8rem; }
        .assign-btn { padding:8px 10px; border:none; border-radius:8px; background:var(--admin-soft); color:var(--admin); font-weight:700; cursor:pointer; font-size:.8rem; }

        .pager { display:flex; justify-content:space-between; align-items:center; margin-top:10px; background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:10px 12px; font-size:.82rem; }
        .pager-controls button { border:1px solid var(--border); background:#fff; padding:7px 10px; border-radius:8px; cursor:pointer; font-weight:600; margin-left:5px; }
    </style>
</head>
<body>
    <div class="shell">
        <div class="top">
            <div><div class="title">Assign Officers</div><div class="sub">Admin queue for assignment</div></div>
            <a class="btn-link" href="/dashboard.html">Back to Dashboard</a>
        </div>
        <div class="toolbar">
            <input id="search" placeholder="Search..."/>
            <select id="status"><option value="">All Status</option><option value="PENDING">Pending</option><option value="IN_PROGRESS">In Progress</option></select>
            <select id="priority"><option value="">All Priorities</option><option value="CRITICAL">Critical</option><option value="HIGH">High</option><option value="MEDIUM">Medium</option><option value="LOW">Low</option></select>
            <select id="category"><option value="">All Categories</option><option value="WATER">Water</option><option value="STREET_LIGHT">Street Light</option><option value="ROAD">Road</option><option value="SANITATION">Sanitation</option><option value="DRAINAGE">Drainage</option><option value="PARK">Park</option><option value="ELECTRICITY">Electricity</option><option value="OTHER">Other</option></select>
            <button class="btn-primary" onclick="reload(0)">Apply</button>
        </div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>ID</th><th>Title</th><th>Citizen</th><th>Status</th><th>Priority</th><th>Assign</th></tr></thead>
                <tbody id="rows"><tr><td colspan="6" style="text-align:center;padding:20px">Loading...</td></tr></tbody>
            </table>
        </div>
        <div class="pager"><div id="meta">-</div><div class="pager-controls"><button onclick="prevPage()">Prev</button><button onclick="nextPage()">Next</button></div></div>
    </div>
    <script>
        const token = localStorage.getItem('civicpulse_token');
        const user = JSON.parse(localStorage.getItem('civicpulse_user') || '{}');
        if (!token || user.role !== 'ADMIN') window.location.href = '/dashboard.html';

        let officers = [];
        let page = 0, totalPages = 0;
        const size = 10;

        async function loadOfficers() {
            const res = await fetch('/api/module3/grievances/officers', { headers: { Authorization: 'Bearer ' + token } });
            officers = res.ok ? await res.json() : [];
        }

        async function reload(targetPage) {
            const params = new URLSearchParams({ page: targetPage, size });
            ['status','priority','category','search'].forEach(id=>{
                const v = document.getElementById(id).value.trim();
                if(v) params.append(id, v);
            });
            const res = await fetch('/api/module3/grievances/admin/list?' + params.toString(), { headers: { Authorization: 'Bearer ' + token } });
            const data = await res.json();
            page = data.page; totalPages = data.totalPages;
            document.getElementById('meta').textContent = `Page ${page + 1} of ${totalPages} | ${data.totalElements} total`;
            document.getElementById('rows').innerHTML = data.content.map(g => `
                <tr>
                    <td>#${g.id}</td><td>${g.title}</td><td>${g.citizenUsername}</td>
                    <td><span class="badge ${g.status==='IN_PROGRESS'?'progress':'pending'}">${g.status}</span></td>
                    <td>${g.priority||'MEDIUM'}</td>
                    <td>
                        <div class="actions">
                            <select id="officer-${g.id}"><option value="">Unassigned</option>${officers.map(n=>`<option value="${n}" ${g.assignedOfficer===n?'selected':''}>${n}</option>`).join('')}</select>
                            <select id="priority-${g.id}"><option value="LOW" ${g.priority==='LOW'?'selected':''}>LOW</option><option value="MEDIUM" ${(!g.priority||g.priority==='MEDIUM')?'selected':''}>MEDIUM</option><option value="HIGH" ${g.priority==='HIGH'?'selected':''}>HIGH</option><option value="CRITICAL" ${g.priority==='CRITICAL'?'selected':''}>CRITICAL</option></select>
                            <button class="assign-btn" onclick="assign(${g.id})">Save</button>
                        </div>
                    </td>
                </tr>`).join('');
        }

        async function assign(id) {
            const officer = document.getElementById(`officer-${id}`).value;
            const priority = document.getElementById(`priority-${id}`).value;
            await fetch('/api/module3/grievances/admin/assign', {
                method:'POST', headers:{'Content-Type':'application/json', Authorization:'Bearer ' + token},
                body: JSON.stringify({ grievanceId:id, assignedOfficer:officer, priority, status: officer?'IN_PROGRESS':'PENDING' })
            });
            reload(page);
        }
        function prevPage() { if (page > 0) reload(page - 1); }
        function nextPage() { if (page + 1 < totalPages) reload(page + 1); }
        (async ()=>{ await loadOfficers(); await reload(0); })();
    </script>
</body>
</html>
